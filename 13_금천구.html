<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>서울시 금천구</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Noto Sans KR',sans-serif;background:#0f0f1a}
#hdr{background:#1a1a2e;color:#fff;padding:9px 16px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #2563eb}
#hdr h1{font-size:16px;font-weight:700}
#hdr .s{font-size:11px;color:#9ca3af}
#map{height:calc(100vh - 44px)}
.al{background:rgba(255,255,255,.98);border:2.5px solid #0f2f66;border-radius:5px;padding:5px 8px;font-size:12px;line-height:1.45;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.al.st{background:#fffbeb;border-color:#d97706;border-width:2.5px}
.al .n{font-weight:800;font-size:12.5px;color:#0f2f66;letter-spacing:-.2px}
.al.st .n{color:#92400e}
.al .i{color:#3f3f46;font-size:11px;font-weight:700}
#leg{position:absolute;bottom:26px;right:10px;z-index:9999;background:rgba(255,255,255,.94);border:1px solid #d1d5db;border-radius:8px;padding:8px 11px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.25);min-width:130px}
#leg h4{font-size:11.5px;margin-bottom:5px;font-weight:700;color:#111}
#leg .r{display:flex;align-items:center;gap:5px;margin:2px 0}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

.station-pin{
  display:flex;
  align-items:center;
  gap:4px;
  background:#0b5bd3;
  color:#fff;
  border:2px solid #fff;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.45);
}
.station-pin .station-dot{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  color:#0b5bd3;
  font-size:12px;
}


.leaflet-tile-pane{
  filter:saturate(1.08) contrast(1.04);
}
.leaflet-tooltip{
  font-family:"Malgun Gothic","Noto Sans KR",sans-serif;
  font-weight:800;
}
#zoomHint{
  position:absolute;
  top:58px;
  left:10px;
  z-index:9999;
  background:rgba(255,255,255,.96);
  border:1px solid #cbd5e1;
  border-radius:8px;
  padding:8px 11px;
  font-size:12px;
  font-weight:800;
  color:#0f172a;
  box-shadow:0 2px 8px rgba(0,0,0,.22);
}

</style></head>
<body>
<div id="hdr"><h1>🗺 서울시 금천구</h1><span class="s">⭐ 저평가 추천단지 | 클릭 → 상세정보</span></div>
<div id="map"></div>
<div id="zoomHint">+ 버튼으로 더 확대하면 주변 단지명이 더 잘 보입니다</div>
<div id="leg">
<h4>범례</h4>
<div class="r"><div class="dot" style="background:#2563eb"></div>지하철역</div>
<div class="r"><div class="dot" style="background:#dc2626"></div>종합병원</div>
<div class="r"><div class="dot" style="background:#7c3aed"></div>백화점/마트</div>
<div class="r"><div class="dot" style="background:#16a34a"></div>학교/학원가</div>
<div class="r"><div class="dot" style="background:#ea580c"></div>상권</div>
<div class="r"><div class="dot" style="background:#0891b2"></div>공원</div>
<div class="r"><span style="font-size:12px">⭐</span> 저평가 추천</div>
</div>
<script>
var map=L.map('map',{maxZoom:22,zoomSnap:.25});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxNativeZoom:19,maxZoom:22}).addTo(map);
var bounds=[];
var apts=[{"gu": "금천구", "dong": "가산동", "name": "두산위브", "year": "98", "units": 1495, "pyeong": 24, "star": false, "lat": 37.476, "lng": 126.884}, {"gu": "금천구", "dong": "독산동", "name": "독산중앙하이츠빌", "year": "04", "units": 554, "pyeong": 34, "star": true, "lat": 37.46025, "lng": 126.8953}, {"gu": "금천구", "dong": "독산동", "name": "금천현대", "year": "02", "units": 996, "pyeong": 24, "star": false, "lat": 37.46025, "lng": 126.8967}, {"gu": "금천구", "dong": "시흥동", "name": "남서울힐스테이트", "year": "14", "units": 1764, "pyeong": 24, "star": true, "lat": 37.449, "lng": 126.89}];
apts.forEach(function(a){
  var s=a.star;
  var h='<div class="al'+(s?' st':'')+'"><div class="n">'+(s?'⭐ ':'')+a.name+'</div><div class="i">\''+a.year+'년 / '+a.units+'세대</div><div class="i">'+a.pyeong+'평</div></div>';
  var icon=L.divIcon({className:'',html:h,iconAnchor:[0,0]});
  L.marker([a.lat,a.lng],{icon:icon}).addTo(map)
   .bindPopup('<b>'+(s?'⭐ ':'')+a.name+'</b><br>\''+a.year+'년 | '+a.units+'세대 | '+a.pyeong+'평'+(s?'<br><span style="color:#d97706;font-weight:700">저평가 추천단지</span>':''));
  bounds.push([a.lat,a.lng]);
});
var COL={subway:'#2563eb',hospital:'#dc2626',dept:'#7c3aed',mart:'#7c3aed',school:'#16a34a',commercial:'#ea580c',park:'#0891b2'};
var EMJ={subway:'🚇',hospital:'🏥',dept:'🏬',mart:'🛒',school:'📚',commercial:'🏪',park:'🌳'};
var ams=[{"name": "독산역(1호선)", "lat": 37.461, "lng": 126.8956, "type": "subway"}, {"name": "시흥역(1호선)", "lat": 37.449, "lng": 126.89, "type": "subway"}, {"name": "가산디지털단지역(7호선/1호선)", "lat": 37.476, "lng": 126.8837, "type": "subway"}, {"name": "이마트 금천점", "lat": 37.4506, "lng": 126.9009, "type": "mart"}, {"name": "금천구의료원", "lat": 37.458, "lng": 126.89, "type": "hospital"}, {"name": "가산디지털단지", "lat": 37.476, "lng": 126.8837, "type": "commercial"}, {"name": "안양천", "lat": 37.455, "lng": 126.895, "type": "park"}];
ams.forEach(function(a){
  var c=COL[a.type]||'#666';var e=EMJ[a.type]||'•';
  if(a.type==='subway'){
    var h='<div class="station-pin"><span class="station-dot">🚇</span><span>'+a.name+'</span></div>';
    L.marker([a.lat,a.lng],{
      icon:L.divIcon({className:'',html:h,iconAnchor:[8,18]}),
      zIndexOffset:900
    }).addTo(map).bindPopup('<b>🚇 '+a.name+'</b>');
    return;
  }
  L.circleMarker([a.lat,a.lng],{radius:7,fillColor:c,color:'#fff',weight:2,opacity:1,fillOpacity:.9}).addTo(map)
   .bindTooltip(e+' '+a.name,{permanent:true,direction:'right',offset:[8,0]})
   .bindPopup('<b>'+e+' '+a.name+'</b>');
});
if(bounds.length>0)map.fitBounds(bounds,{padding:[50,50]});
</script></body></html>
