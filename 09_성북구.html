#leg .r{display:flex;align-items:center;gap:5px;margin:2px 0}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

.station-pin{
  display:flex;
  align-items:center;
  gap:4px;
  background:#0b5bd3;
  color:#fff;
  border:2px solid #fff;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.45);
}
.station-pin .station-dot{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  color:#0b5bd3;
  font-size:12px;
}


.leaflet-tile-pane{

}
.leaflet-tooltip{
  font-family:"Malgun Gothic","Noto Sans KR",sans-serif;

  font-weight:800;
  color:#0f172a;
